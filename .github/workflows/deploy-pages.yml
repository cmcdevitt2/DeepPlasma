name: Deploy PINN Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/web/package-lock.json

      - name: Install web dependencies
        working-directory: demo/web
        run: npm ci

      - name: Copy models into web public folder
        run: |
          rm -rf demo/web/public/models
          mkdir -p demo/web/public/models
          cp demo/models/*.onnx demo/web/public/models/
          cp demo/models/metadata.json demo/web/public/models/

      - name: Build web demo
        working-directory: demo/web
        run: npm run build

      - name: Assemble Pages artifact under /demo
        run: |
          mkdir -p _pages/demo
          cp -R demo/web/dist/* _pages/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4